<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="曹超越科研动态证据库：连接科学问题、可检验主张、文献证据、机制图谱、论文结构、证据缺口与实验决策。">
  <meta name="theme-color" content="#07101e">
  <title>曹超越科研动态证据库</title>
  <link rel="stylesheet" href="assets/evidence-v3.css">
  <link rel="stylesheet" href="assets/evidence-v3-1.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand"><strong>科研动态证据库</strong><span>科学问题 → 主张 → 证据 → 图谱 → 论文 → 实验决策</span></div>
      <div class="project-switch"><label for="projectSelect">当前课题</label><select id="projectSelect" onchange="switchProject(this.value)"></select></div>
      <nav>
        <button class="nav-btn active" data-page="dashboard" onclick="go('dashboard')" type="button"><span>◈ 证据驾驶舱</span></button>
        <button class="nav-btn" data-page="questions" onclick="go('questions')" type="button"><span>？ 科学问题</span><b id="nQuestions">0</b></button>
        <button class="nav-btn" data-page="claims" onclick="go('claims')" type="button"><span>◆ 主张与证据</span><b id="nClaims">0</b></button>
        <button class="nav-btn" data-page="papers" onclick="go('papers')" type="button"><span>▤ 文献库</span><b id="nPapers">0</b></button>
        <button class="nav-btn" data-page="intake" onclick="go('intake')" type="button"><span>⇩ 结构化导入</span></button>
        <button class="nav-btn" data-page="knowledge" onclick="go('knowledge')" type="button"><span>⌘ 机制知识图谱</span><b id="nGraph">0</b></button>
        <button class="nav-btn" data-page="figures" onclick="go('figures')" type="button"><span>▦ 论文与 Figure</span><b id="nFigures">0</b></button>
        <button class="nav-btn" data-page="gaps" onclick="go('gaps')" type="button"><span>△ 证据缺口</span><b id="nGaps">0</b></button>
        <button class="nav-btn" data-page="experiments" onclick="go('experiments')" type="button"><span>⚗ 实验与决策</span><b id="nExperiments">0</b></button>
        <button class="nav-btn" data-page="maintenance" onclick="go('maintenance')" type="button"><span>⚙ 数据维护</span></button>
      </nav>
      <div class="side-foot"><div>动态证据库 v3.5</div><div id="lastSaved">浏览器本地工作区</div></div>
    </aside>
    <main class="main">
      <section class="page active" id="page-dashboard"></section><section class="page" id="page-questions"></section><section class="page" id="page-claims"></section><section class="page" id="page-papers"></section><section class="page" id="page-intake"></section><section class="page" id="page-knowledge"></section><section class="page" id="page-figures"></section><section class="page" id="page-gaps"></section><section class="page" id="page-experiments"></section><section class="page" id="page-maintenance"></section>
    </main>
  </div>
  <div class="modal-wrap" id="modalWrap" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
  <input id="importFile" class="hidden" type="file" accept="application/json,.json" onchange="importWorkspace(event)">
  <script src="assets/evidence-core-v3.js"></script>
  <script src="assets/evidence-pages-v3-1.js"></script>
  <script src="assets/evidence-pages-v3-2.js"></script>
  <script src="assets/evidence-pages-v3-4.js"></script>
  <script src="assets/evidence-pages-v3-5.js"></script>
  <script src="assets/evidence-pages-v3-3.js"></script>
</body>
</html>
