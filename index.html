<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超越文献库 v2 · 草食动物肝脏免疫代谢</title>
<style>
  :root {
    --bg: #0a0e27; --bg2: #141832; --surface: rgba(255,255,255,0.03);
    --surface2: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08);
    --text: #e0e4f0; --text2: #9498b0; --gold: #e8c547; --coral: #e94560;
    --cyan: #00d4aa; --blue: #5b9cf5; --purple: #a78bfa;
    --sidebar: 240px; --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter','Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Sidebar */
  .sidebar {
    width:var(--sidebar); min-width:var(--sidebar); background:var(--bg2);
    display:flex; flex-direction:column; padding:24px 0; position:fixed; top:0; left:0;
    height:100vh; border-right:1px solid var(--border); z-index:100;
  }
  .sidebar-logo { padding:0 20px 24px; font-size:20px; font-weight:700; color:var(--gold); }
  .sidebar-logo span { font-size:12px; color:var(--text2); display:block; }
  .sidebar nav { flex:1; }
  .sidebar nav a {
    display:flex; align-items:center; gap:10px; padding:12px 20px; color:var(--text2);
    text-decoration:none; font-size:14px; transition:all .2s; border-left:3px solid transparent;
  }
  .sidebar nav a:hover, .sidebar nav a.active { color:var(--text); background:var(--surface); border-left-color:var(--gold); }
  .sidebar nav a .badge { margin-left:auto; background:var(--surface2); padding:2px 8px; border-radius:10px; font-size:11px; }
  .sidebar nav a.active .badge { background:rgba(232,197,71,0.15); color:var(--gold); }
  .sidebar-footer { padding:20px; font-size:11px; color:var(--text2); border-top:1px solid var(--border); }

  /* Main */
  .main { margin-left:var(--sidebar); flex:1; overflow-y:auto; min-height:100vh; }
  .page { display:none; padding:32px; max-width:1200px; } .page.active { display:block; }
  .page h2 { font-size:24px; margin-bottom:24px; color:var(--text); }
  .page h2 .sub { font-size:14px; color:var(--text2); font-weight:400; margin-left:8px; }

  /* Glass cards */
  .g-card {
    background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border);
    border-radius:var(--radius); padding:20px;
  }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card { text-align:center; padding:24px 16px; }
  .stat-card .num { font-size:36px; font-weight:700; }
  .stat-card .num.gold { color:var(--gold); } .stat-card .num.coral { color:var(--coral); }
  .stat-card .num.cyan { color:var(--cyan); } .stat-card .num.blue { color:var(--blue); }
  .stat-card .label { font-size:13px; color:var(--text2); margin-top:4px; }

  /* Charts area */
  .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .chart-box { min-height:320px; display:flex; flex-direction:column; }
  .chart-box h3 { font-size:15px; margin-bottom:12px; color:var(--text2); }
  .chart-box canvas { flex:1; width:100%; }

  /* Paper cards (browse) */
  .browse-layout { display:flex; gap:16px; }
  .browse-sidebar { width:200px; flex-shrink:0; }
  .browse-main { flex:1; }
  .filter-box { margin-bottom:16px; }
  .filter-box h3 { font-size:13px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
  .filter-tag {
    display:inline-block; padding:4px 10px; margin:2px; border-radius:14px;
    font-size:12px; cursor:pointer; border:1px solid var(--border); color:var(--text2);
    transition:all .2s; user-select:none;
  }
  .filter-tag:hover { border-color:var(--text2); }
  .filter-tag.active { background:rgba(232,197,71,0.15); border-color:var(--gold); color:var(--gold); }
  .search-box {
    width:100%; padding:12px 16px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; margin-bottom:16px;
  }
  .search-box:focus { border-color:var(--gold); }
  .sort-row { display:flex; gap:8px; margin-bottom:16px; }
  .sort-row select {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:6px 12px; font-size:13px; outline:none;
  }

  .paper-card {
    background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border);
    border-left:3px solid var(--border); border-radius:0 var(--radius) var(--radius) 0;
    padding:16px 20px; margin-bottom:10px; cursor:pointer; transition:all .2s;
  }
  .paper-card:hover { background:var(--surface2); }
  .paper-card.cns { border-left-color:var(--gold); }
  .paper-card.must-read { box-shadow:inset 0 0 0 1px rgba(233,69,96,0.15); }
  .paper-card .pc-title { font-size:14px; font-weight:600; margin-bottom:4px; line-height:1.4; }
  .paper-card .pc-title-cn { font-size:13px; color:var(--text2); margin-bottom:8px; }
  .paper-card .pc-meta { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
  .paper-card .pc-meta .journal {
    font-size:12px; font-weight:600; padding:2px 8px; border-radius:4px; white-space:nowrap;
  }
  .journal-cns { background:rgba(232,197,71,0.15); color:var(--gold); }
  .journal-sub { background:rgba(91,156,245,0.15); color:var(--blue); }
  .journal-field { background:var(--surface2); color:var(--text2); }
  .paper-card .pc-meta .year { font-size:12px; color:var(--text2); }
  .paper-card .pc-meta .authors { font-size:12px; color:var(--text2); max-width:300px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .paper-card .pc-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .paper-card .pc-tags .tag {
    font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid var(--border);
    color:var(--text2);
  }
  .paper-card .pc-abstract { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:13px; color:var(--text2); line-height:1.6; }
  .paper-card.expanded .pc-abstract { display:block; }
  .paper-card .pc-abstract .ab-cn { margin-top:8px; color:var(--text); }
  .paper-card .pc-actions { display:flex; gap:6px; margin-top:8px; }
  .paper-card .pc-actions button {
    background:var(--surface2); border:1px solid var(--border); color:var(--text2);
    padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; transition:all .2s;
  }
  .paper-card .pc-actions button:hover { border-color:var(--gold); color:var(--gold); }

  /* Detail modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .modal-overlay.active { display:flex; }
  .modal {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
    padding:32px; max-width:800px; width:90%; max-height:85vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size:18px; margin-bottom:8px; }
  .modal .m-title-cn { font-size:15px; color:var(--text2); margin-bottom:16px; }
  .modal .m-meta { display:flex; gap:12px; margin-bottom:16px; font-size:13px; }
  .modal .m-abstract { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:16px; }
  .modal .m-abstract-cn { font-size:13px; color:var(--text); line-height:1.7; margin-bottom:16px; padding:12px; background:var(--surface); border-radius:8px; }
  .modal .note-editor { width:100%; min-height:80px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:12px; font-size:13px; font-family:inherit; resize:vertical; margin-bottom:12px; }
  .modal .m-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .modal .m-actions button, .modal .m-actions .btn-link {
    padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid var(--border);
    background:var(--surface); color:var(--text); text-decoration:none; transition:all .2s;
  }
  .modal .m-actions button:hover { border-color:var(--gold); }
  .btn-close { background:rgba(233,69,96,0.15) !important; border-color:var(--coral) !important; color:var(--coral) !important; }

  /* Analytics */
  .analytics-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .progress-ring { display:flex; align-items:center; justify-content:center; }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { width:64px; min-width:64px; }
    .sidebar-logo { font-size:16px; padding:0 12px 24px; }
    .sidebar-logo span, .sidebar nav a span:not(.emoji), .sidebar nav a .badge, .sidebar-footer { display:none; }
    .sidebar nav a { justify-content:center; padding:12px 0; }
    .main { margin-left:64px; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .charts-row, .analytics-grid, .browse-layout { grid-template-columns:1fr; }
    .browse-sidebar { display:none; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">🦞 超越文献库<span>草食动物肝脏免疫代谢</span></div>
  <nav>
    <a href="#dashboard" class="active" data-page="dashboard"><span class="emoji">🏠</span> <span>总览</span></a>
    <a href="#browse" data-page="browse"><span class="emoji">🔍</span> <span>浏览</span><span class="badge" id="browse-count">-</span></a>
    <a href="#mustread" data-page="mustread"><span class="emoji">📖</span> <span>必读</span><span class="badge" id="mustread-count">-</span></a>
    <a href="#cns" data-page="cns"><span class="emoji">⭐</span> <span>顶刊</span><span class="badge" id="cns-count">-</span></a>
    <a href="#analytics" data-page="analytics"><span class="emoji">📊</span> <span>分析</span></a>
  </nav>
  <div class="sidebar-footer">v2 · 2026 · by 小龙虾</div>
</aside>

<main class="main" id="main-content">
<!-- Dashboard -->
<div class="page active" id="page-dashboard"></div>
<!-- Browse -->
<div class="page" id="page-browse"></div>
<!-- Must Read -->
<div class="page" id="page-mustread"></div>
<!-- CNS -->
<div class="page" id="page-cns"></div>
<!-- Analytics -->
<div class="page" id="page-analytics"></div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ============================= DATA =============================
let PAPERS = [];
let statuses = {}; // pid -> { read:bool, note:string }
let notes = {};

function loadStatuses() {
  try { statuses = JSON.parse(localStorage.getItem('lit-statuses')||'{}'); } catch(e) { statuses={}; }
  try { notes = JSON.parse(localStorage.getItem('lit-notes')||'{}'); } catch(e) { notes={}; }
}
function saveStatuses() { localStorage.setItem('lit-statuses', JSON.stringify(statuses)); }
function saveNotes() { localStorage.setItem('lit-notes', JSON.stringify(notes)); }
function toggleRead(pid) { statuses[pid] = {read:!(statuses[pid]?.read), note:statuses[pid]?.note||''}; saveStatuses(); refreshCurrentPage(); }
function getReadCount() { return PAPERS.filter(p=>statuses[p.id]?.read).length; }

function journalTier(j) {
  if (!j) return 'field';
  const jl = j.toLowerCase();
  if (jl.includes('nature') && !jl.includes('communications') && !jl.includes('reviews') && !jl.includes('medicine') && !jl.includes('immunology') && !jl.includes('genetics') && !jl.includes('biotechnology') && !jl.includes('metabolism') && !jl.includes('cell biology') && !jl.includes('ecology')) return 'cns';
  if (jl.includes('science') && !jl.includes('advances') && !jl.includes('immunology') && !jl.includes('translational')) return 'cns';
  if (jl==='cell' || jl.includes('pnas') || jl==='immunity' || jl==='molecular cell') return 'cns';
  if (jl.includes('nature ') || jl.includes('science ') || jl.includes('cell ') || jl==='elife' || jl.includes('gut') || jl.includes('hepatology') || jl.includes('gastroenterology')) return 'sub';
  return 'field';
}
function tierLabel(t) { return t==='cns'?'CNS':t==='sub'?'子刊':'领域'; }
function tierClass(t) { return t==='cns'?'journal-cns':t==='sub'?'journal-sub':'journal-field'; }

function getAllTags() {
  const map = {};
  PAPERS.forEach(p => (p.tags||[]).forEach(t => { map[t] = (map[t]||0)+1; }));
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,20);
}

// ============================= RENDERING =============================
function renderStats() {
  const total = PAPERS.length;
  const cnsCount = PAPERS.filter(p=>journalTier(p.journal)==='cns').length;
  const read = getReadCount();
  const now = new Date(); const weekAgo = new Date(now-7*86400000).toISOString().split('T')[0];
  const newCount = PAPERS.filter(p=>p.added_date >= weekAgo).length;
  return `
    <div class="stats-row">
      <div class="g-card stat-card"><div class="num gold">${total}</div><div class="label">📚 总文献</div></div>
      <div class="g-card stat-card"><div class="num gold">${cnsCount}</div><div class="label">⭐ CNS/顶刊</div></div>
      <div class="g-card stat-card"><div class="num cyan">${read}</div><div class="label">✅ 已读</div></div>
      <div class="g-card stat-card"><div class="num coral">${newCount}</div><div class="label">🆕 本周新增</div></div>
    </div>`;
}

function drawBubbleChart(canvasId, data) {
  // Replace bubble chart with clear non-overlapping horizontal bar chart
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);

  // Sort by count descending
  const sorted = [...data].sort((a,b)=>b.count-a.count);
  const maxCount = Math.max(...data.map(d=>d.count),1);
  const n = sorted.length;
  const barH = Math.min(28, (h-40)/n - 4);
  const gap = 4;
  const leftPad = 100, rightPad = 80;
  const chartW = w - leftPad - rightPad;
  const startY = 16;

  // Color map
  const colors = ['#e8c547','#e94560','#5b9cf5','#00d4aa','#a78bfa','#f59e0b','#ec4899','#14b8a6',
    '#6366f1','#f43f5e','#8b5cf6','#22c55e'];

  sorted.forEach((d,i) => {
    const y = startY + i*(barH+gap);
    const bw = Math.max(10, (d.count/maxCount)*chartW);
    const mustRatio = d.count>0 ? d.mustRead/d.count : 0;

    // Bar background (total)
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(leftPad, y, chartW, barH + 4);

    // Filled portion
    const gradient = ctx.createLinearGradient(leftPad, 0, leftPad+bw, 0);
    gradient.addColorStop(0, colors[i%colors.length]);
    gradient.addColorStop(1, colors[i%colors.length].replace(')','0.4)'));
    ctx.fillStyle = gradient;
    ctx.fillRect(leftPad, y+2, bw, barH);

    // Must-read indicator
    if (mustRatio>0) {
      ctx.fillStyle = 'rgba(233,69,96,0.7)';
      ctx.fillRect(leftPad, y+2, bw*mustRatio, barH);
    }

    // Tag label (left)
    ctx.fillStyle='#e0e4f0'; ctx.font='11px Inter,Noto Sans SC,sans-serif';
    ctx.textAlign='right'; ctx.fillText(d.tag, leftPad-6, y+barH/2+4);

    // Count label (right of bar)
    const cntText = d.count+'篇'+(mustRatio>0?' (必读'+Math.round(mustRatio*100)+'%)':'');
    ctx.fillStyle='#9498b0'; ctx.font='10px Inter,sans-serif';
    ctx.textAlign='left'; ctx.fillText(cntText, leftPad+bw+6, y+barH/2+4);
  });

  // Legend
  ctx.fillStyle='rgba(233,69,96,0.7)'; ctx.fillRect(leftPad, startY+n*(barH+gap)+12, 10, 10);
  ctx.fillStyle='#9498b0'; ctx.font='10px Inter,sans-serif'; ctx.textAlign='left';
  ctx.fillText('= 必读占比', leftPad+14, startY+n*(barH+gap)+22);
}

function drawTimeline(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);

  const maxVal = Math.max(...data.map(d=>d.total),1);
  const pad = {l:35, r:20, t:20, b:30};
  const barW = (w-pad.l-pad.r)/data.length - 8;
  const chartH = h-pad.t-pad.b;

  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,h-pad.b); ctx.lineTo(w-pad.r,h-pad.b); ctx.stroke();

  data.forEach((d,i) => {
    const x = pad.l + i*((w-pad.l-pad.r)/data.length) + 4;
    const totalH = (d.total/maxVal)*chartH;
    const mustH = (d.mustRead/maxVal)*chartH;

    // Must-read bar
    ctx.fillStyle='rgba(233,69,96,0.6)';
    ctx.fillRect(x, h-pad.b-mustH, barW, mustH);
    // Total bar
    ctx.fillStyle='rgba(232,197,71,0.3)';
    ctx.fillRect(x, h-pad.b-totalH, barW, totalH-mustH);

    ctx.fillStyle='#9498b0'; ctx.font='10px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.year, x+barW/2, h-8);
    ctx.fillStyle='#e0e4f0'; ctx.font='9px Inter,sans-serif';
    ctx.fillText(d.total, x+barW/2, h-pad.b-totalH-6);
  });

  // Legend
  ctx.fillStyle='rgba(233,69,96,0.6)'; ctx.fillRect(w-200,12,12,12);
  ctx.fillStyle='#9498b0'; ctx.font='11px Inter,sans-serif'; ctx.textAlign='left'; ctx.fillText('必读',w-184,22);
  ctx.fillStyle='rgba(232,197,71,0.3)'; ctx.fillRect(w-130,12,12,12);
  ctx.fillText('全部',w-114,22);
}

function drawRadar(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);

  const cx = w/2, cy = h/2+8, maxR = Math.min(w,h)*0.28;
  const n = data.length;
  const maxVal = Math.max(...data.map(d=>d.value),1);

  // Grid
  for (let ri=1; ri<=4; ri++) {
    ctx.beginPath();
    for (let i=0; i<n; i++) {
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      const r = (ri/4)*maxR;
      const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.stroke();
  }

  // Axes
  for (let i=0; i<n; i++) {
    const angle = (Math.PI*2/n)*i - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+maxR*Math.cos(angle),cy+maxR*Math.sin(angle));
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.stroke();
    ctx.fillStyle='#9498b0'; ctx.font='11px Inter,Noto Sans SC,sans-serif';
    const lx = cx + (maxR+30)*Math.cos(angle), ly = cy + (maxR+30)*Math.sin(angle)+4;
    // Adjust text alignment per quadrant to prevent cutoff
    if (lx > cx+10) ctx.textAlign='left';
    else if (lx < cx-10) ctx.textAlign='right';
    else ctx.textAlign='center';
    ctx.fillText(data[i].label, lx, ly);
  }

  // Data
  ctx.beginPath();
  for (let i=0; i<n; i++) {
    const angle = (Math.PI*2/n)*i - Math.PI/2;
    const r = (data[i].value/maxVal)*maxR;
    const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(232,197,71,0.2)'; ctx.fill();
  ctx.strokeStyle='rgba(232,197,71,0.6)'; ctx.lineWidth=2; ctx.stroke();
}

function drawProgressRing(canvasId, pct) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2, r=Math.min(w,h)*0.35;

  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=12; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(Math.PI*2*pct/100));
  ctx.strokeStyle=pct>50? '#00d4aa':'#e8c547'; ctx.lineWidth=12; ctx.stroke();

  ctx.fillStyle='#e0e4f0'; ctx.font='bold 28px Inter,sans-serif'; ctx.textAlign='center';
  ctx.fillText(Math.round(pct)+'%', cx, cy+4);
  ctx.font='11px Inter,sans-serif'; ctx.fillStyle='#9498b0';
  ctx.fillText('阅读进度', cx, cy+24);
}

function drawBarChart(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2,2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);

  const maxVal = Math.max(...data.map(d=>d.value),1);
  const barH = 28, gap = 12, totalH = data.length*(barH+gap)+20;
  const startY = 20;

  const colors = {cns:'rgba(232,197,71,0.7)',sub:'rgba(91,156,245,0.6)',field:'rgba(148,152,176,0.4)'};

  data.forEach((d,i) => {
    const y = startY + i*(barH+gap);
    const bw = (d.value/maxVal)*(w-160);
    ctx.fillStyle = colors[d.key]||'rgba(255,255,255,0.3)';
    ctx.fillRect(100, y, bw, barH);
    ctx.fillStyle='#e0e4f0'; ctx.font='12px Inter,sans-serif'; ctx.textAlign='right';
    ctx.fillText(d.label, 92, y+barH-8);
    ctx.fillStyle='#e0e4f0'; ctx.textAlign='left'; ctx.font='12px Inter,sans-serif';
    const pct = data.reduce((s,x)=>s+x.value,0);
    ctx.fillText(d.value+'篇 ('+(pct>0?Math.round(d.value/pct*100):0)+'%)', 104+bw+6, y+barH-8);
  });
}

function renderPaperCard(p, expanded=false) {
  const tier = journalTier(p.journal);
  const isRead = statuses[p.id]?.read;
  const tierCls = tier==='cns'?'cns':tier==='sub'?'sub':'field';
  return `
    <div class="paper-card ${tier==='cns'?'cns':''} ${p.importance==='must-read'?'must-read':''} ${expanded?'expanded':''}"
         id="card-${p.id}" onclick="toggleCard('${p.id}')">
      <div class="pc-title">${p.title||''}</div>
      <div class="pc-title-cn">${p.title_cn||''}</div>
      <div class="pc-meta">
        <span class="journal ${tierClass(tier)}">${p.journal||'Unknown'} · ${tierLabel(tier)}</span>
        <span class="year">📅 ${p.year||'?'}</span>
        <span class="authors">👤 ${p.authors||''}</span>
        ${isRead?'<span style="font-size:11px;color:#00d4aa;">✅ 已读</span>':''}
        ${p.importance==='must-read'?'<span style="font-size:11px;color:#e94560;">⭐ 必读</span>':''}
      </div>
      <div class="pc-tags">${(p.tags||[]).slice(0,6).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="pc-abstract">
        ${p.abstract?`<div><strong>📖 Abstract</strong><br>${p.abstract}</div>`:''}
        ${p.abstract_cn?`<div class="ab-cn"><strong>📖 中文摘要</strong><br>${p.abstract_cn}</div>`:''}
      </div>
      <div class="pc-actions" onclick="event.stopPropagation()">
        <button onclick="toggleRead('${p.id}')">${isRead?'✅ 已读':'📖 标为已读'}</button>
        <button onclick="openDetail('${p.id}')">📋 详情</button>
        <button onclick="copyBibtex('${p.id}')">📎 BibTeX</button>
        ${p.article_url&&p.article_url!=='#'?`<a href="${p.article_url}" target="_blank" style="text-decoration:none;color:inherit;"><button>🌐 PubMed</button></a>`:''}
      </div>
    </div>`;
}

function toggleCard(pid) {
  document.getElementById('card-'+pid)?.classList.toggle('expanded');
}

// ============================= MODAL =============================
function openDetail(pid) {
  const p = PAPERS.find(x=>x.id===pid);
  if (!p) return;
  const tier = journalTier(p.journal);
  const note = notes[pid]||'';
  document.getElementById('modal-content').innerHTML = `
    <h3>${p.title||''}</h3>
    <div class="m-title-cn">${p.title_cn||''}</div>
    <div class="m-meta">
      <span class="journal ${tierClass(tier)}">${p.journal||'Unknown'} · ${tierLabel(tier)}</span>
      <span>📅 ${p.year||'?'}</span>
      <span>👤 ${p.authors||''}</span>
      <span>PMID: ${p.pmid||p.id||''}</span>
    </div>
    ${p.abstract?`<div class="m-abstract"><strong>📖 Abstract</strong><br>${p.abstract}</div>`:''}
    ${p.abstract_cn?`<div class="m-abstract-cn"><strong>📖 中文摘要</strong><br>${p.abstract_cn}</div>`:''}
    <div class="m-meta" style="margin-bottom:8px;">🏷️ ${(p.tags||[]).map(t=>`<span style="background:var(--surface2);padding:2px 8px;border-radius:10px;font-size:11px;">${t}</span>`).join(' ')}</div>
    <textarea class="note-editor" id="note-${pid}" placeholder="📝 写笔记... (Markdown)">${note}</textarea>
    <div class="m-actions">
      <button onclick="saveNote('${pid}')">💾 保存笔记</button>
      <button onclick="copyBibtex('${pid}');closeModal()">📎 复制 BibTeX</button>
      <button onclick="copyEndnote('${pid}');closeModal()">📎 复制 EndNote</button>
      ${p.article_url&&p.article_url!=='#'?`<a href="${p.article_url}" target="_blank" class="btn-link">🌐 PubMed</a>`:''}
      ${p.doi?`<a href="https://doi.org/${p.doi}" target="_blank" class="btn-link">🔗 DOI</a>`:''}
      <button onclick="closeModal()" class="btn-close">✕ 关闭</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
function saveNote(pid) {
  notes[pid] = document.getElementById('note-'+pid)?.value||'';
  saveNotes(); closeModal();
}

function copyBibtex(pid) {
  const p = PAPERS.find(x=>x.id===pid); if(!p) return;
  const b = `@article{${p.pmid||p.id},\n  title = {${p.title||''}},\n  author = {${p.authors||''}},\n  journal = {${p.journal||''}},\n  year = {${p.year||''}},\n  doi = {${p.doi||''}},\n  pmid = {${p.pmid||p.id}}\n}`;
  navigator.clipboard.writeText(b).then(()=>alert('BibTeX 已复制！'));
}
function copyEndnote(pid) {
  const p = PAPERS.find(x=>x.id===pid); if(!p) return;
  const e = `%0 Journal Article\n%T ${p.title||''}\n%A ${p.authors||''}\n%J ${p.journal||''}\n%D ${p.year||''}\n%M ${p.pmid||p.id}\n%R ${p.doi||''}`;
  navigator.clipboard.writeText(e).then(()=>alert('EndNote 已复制！'));
}

// ============================= PAGES =============================
function renderDashboard() {
  // Bubble data
  const tags = getAllTags();
  const bubbleData = tags.slice(0,8).map(([tag,count]) => {
    const papers = PAPERS.filter(p=>(p.tags||[]).includes(tag));
    const avgYear = papers.length?papers.reduce((s,p)=>s+(p.year||2025),0)/papers.length:2025;
    const mustRead = papers.filter(p=>p.importance==='must-read').length;
    return {tag, count, avgYear, mustRead};
  });

  // Timeline data
  const yearMap = {};
  PAPERS.forEach(p=>{ const y=p.year||2025; if(!yearMap[y]) yearMap[y]={total:0,mustRead:0}; yearMap[y].total++; if(p.importance==='must-read') yearMap[y].mustRead++; });
  const timeline = Object.entries(yearMap).sort((a,b)=>a[0]-b[0]).map(([year,d])=>({year,d}));
  const timelineData = timeline.map(t=>({year:t.year, total:t.d.total, mustRead:t.d.mustRead}));

  // Recent
  const recent = [...PAPERS].sort((a,b)=>(b.added_date||'').localeCompare(a.added_date||'')).slice(0,6);

  document.getElementById('page-dashboard').innerHTML = `
    ${renderStats()}
    <div class="charts-row">
      <div class="g-card chart-box"><h3>🔬 研究方向分布</h3><canvas id="chart-bubble"></canvas></div>
      <div class="g-card chart-box"><h3>📅 出版时间线</h3><canvas id="chart-timeline"></canvas></div>
    </div>
    <div class="g-card"><h3 style="margin-bottom:12px;font-size:15px;color:var(--text2);">🆕 最近添加</h3>${recent.map(p=>renderPaperCard(p)).join('')}</div>`;

  setTimeout(()=>{ drawBubbleChart('chart-bubble', bubbleData); drawTimeline('chart-timeline', timelineData); }, 100);
}

function renderBrowse(filterTags, filterImportance, query) {
  let filtered = [...PAPERS];
  if (filterTags && filterTags.length) filtered = filtered.filter(p=>(p.tags||[]).some(t=>filterTags.includes(t)));
  if (filterImportance) filtered = filtered.filter(p=>p.importance===filterImportance);
  if (query) {
    const q = query.toLowerCase();
    filtered = filtered.filter(p=>p.title.toLowerCase().includes(q)||(p.title_cn||'').includes(q)||(p.authors||'').toLowerCase().includes(q));
  }
  filtered.sort((a,b)=>(b.added_date||'').localeCompare(a.added_date||''));

  const allTags = getAllTags();
  const activeTags = new Set(filterTags||[]);
  document.getElementById('page-browse').innerHTML = `
    <h2>🔍 浏览文献<span class="sub">${filtered.length} 篇</span></h2>
    <input class="search-box" id="browse-search" placeholder="搜索标题/作者..." value="${query||''}" oninput="browseSearch()">
    <div class="sort-row">
      <select onchange="browseSort(this.value)"><option value="date">按日期</option><option value="year">按出版年</option><option value="journal">按期刊</option></select>
    </div>
    <div class="browse-layout">
      <div class="browse-sidebar">
        <div class="g-card filter-box"><h3>📂 研究方向</h3>
          ${allTags.map(([tag,count])=>`<span class="filter-tag ${activeTags.has(tag)?'active':''}" onclick="toggleFilter('${tag.replace(/'/g,"\\'")}')">${tag} (${count})</span>`).join('')}
        </div>
        <div class="g-card filter-box"><h3>📌 重要性</h3>
          <span class="filter-tag ${filterImportance==='must-read'?'active':''}" onclick="setImportance('must-read')">⭐ 必读</span>
          <span class="filter-tag ${filterImportance==='important'?'active':''}" onclick="setImportance('important')">📌 重要</span>
          <span class="filter-tag ${!filterImportance?'active':''}" onclick="setImportance('')">全部</span>
        </div>
      </div>
      <div class="browse-main">${filtered.map(p=>renderPaperCard(p)).join('')||'<div class="g-card" style="text-align:center;padding:40px;color:var(--text2);">📭 无匹配文献</div>'}</div>
    </div>`;
}

let browseState = {tags:[], importance:'', query:'', sort:'date'};
function toggleFilter(tag) {
  if (browseState.tags.includes(tag)) browseState.tags = browseState.tags.filter(t=>t!==tag);
  else browseState.tags.push(tag);
  refreshBrowse();
}
function setImportance(v) { browseState.importance = browseState.importance===v?'':v; refreshBrowse(); }
function browseSearch() { browseState.query = document.getElementById('browse-search')?.value||''; refreshBrowse(); }
function browseSort(s) { browseState.sort=s; refreshBrowse(); }
function refreshBrowse() { renderBrowse(browseState.tags, browseState.importance, browseState.query); }

function renderMustRead() {
  const papers = PAPERS.filter(p=>p.importance==='must-read');
  papers.sort((a,b)=>(b.added_date||'').localeCompare(a.added_date||''));
  document.getElementById('page-mustread').innerHTML = `
    <h2>📖 必读文献<span class="sub">${papers.length} 篇</span></h2>
    ${papers.map(p=>renderPaperCard(p)).join('')}`;
}

function renderCNS() {
  let papers = PAPERS.filter(p=>journalTier(p.journal)==='cns');
  papers.sort((a,b)=>(b.year||0)-(a.year||0));
  document.getElementById('page-cns').innerHTML = `
    <h2>⭐ CNS/顶刊<span class="sub">${papers.length} 篇</span></h2>
    ${papers.map(p=>renderPaperCard(p)).join('')}`;
}

function renderAnalytics() {
  const total = PAPERS.length, read = getReadCount();
  const pct = total>0?Math.round(read/total*100):0;

  const tierCount = {cns:0,sub:0,field:0};
  PAPERS.forEach(p=>{ tierCount[journalTier(p.journal)]++; });
  const barData = [
    {key:'cns',label:'CNS/顶刊',value:tierCount.cns},
    {key:'sub',label:'子刊/高IF',value:tierCount.sub},
    {key:'field',label:'领域期刊',value:tierCount.field}
  ];

  const directions = ['single-cell','liver immunity','liver metabolism','bile acid','evolution','gut-liver axis'];
  const dirLabels = ['单细胞组学','肝脏免疫','肝脏代谢','胆汁酸','进化','肠肝轴'];
  const radarData = directions.map((d,i) => {
    const papers = PAPERS.filter(p=>(p.tags||[]).some(t=>t.toLowerCase().includes(d)));
    return {label:dirLabels[i], value:papers.length};
  });

  document.getElementById('page-analytics').innerHTML = `
    <h2>📊 分析</h2>
    <div class="analytics-grid">
      <div class="g-card" style="display:flex;flex-direction:column;align-items:center;">
        <h3 style="margin-bottom:16px;color:var(--text2);">📖 阅读进度</h3>
        <div class="progress-ring" style="width:240px;height:240px;"><canvas id="chart-progress" width="480" height="480" style="width:240px;height:240px;"></canvas></div>
        <div style="margin-top:12px;font-size:13px;color:var(--text2);">${read} / ${total} 篇已读</div>
      </div>
      <div class="g-card chart-box" style="min-height:300px;">
        <h3>📰 期刊分布</h3>
        <canvas id="chart-bars" style="width:100%;height:250px;"></canvas>
      </div>
      <div class="g-card chart-box" style="min-height:360px;">
        <h3>🎯 研究方向覆盖</h3>
        <canvas id="chart-radar" style="width:100%;height:320px;"></canvas>
      </div>
      <div class="g-card" style="padding:20px;">
        <h3 style="margin-bottom:12px;color:var(--text2);">📋 数据概况</h3>
        <div style="font-size:14px;line-height:2.2;">
          <div>📚 总文献: <strong>${total}</strong> 篇</div>
          <div>⭐ 必读: <strong>${PAPERS.filter(p=>p.importance==='must-read').length}</strong> 篇</div>
          <div>🏆 顶刊: <strong>${tierCount.cns}</strong> 篇</div>
          <div>📰 子刊: <strong>${tierCount.sub}</strong> 篇</div>
          <div>📄 领域期刊: <strong>${tierCount.field}</strong> 篇</div>
          <div>🏷️ 研究方向: <strong>${getAllTags().length}</strong> 个</div>
          <div>📅 更新: <strong>${PAPERS.length>0?(PAPERS.reduce((a,p)=>p.added_date>a?p.added_date:a,'')):'—'}</strong></div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{ drawProgressRing('chart-progress',pct); drawBarChart('chart-bars',barData); drawRadar('chart-radar',radarData); },100);
}

// ============================= NAVIGATION =============================
function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+page)?.classList.add('active');
  document.querySelector(`.sidebar nav a[data-page="${page}"]`)?.classList.add('active');

  if (page==='dashboard') renderDashboard();
  else if (page==='browse') refreshBrowse();
  else if (page==='mustread') renderMustRead();
  else if (page==='cns') renderCNS();
  else if (page==='analytics') renderAnalytics();
}

function refreshCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const page = active.id.replace('page-','');
  navigateTo(page);
}

// ============================= INIT =============================
async function init() {
  loadStatuses();
  try {
    const resp = await fetch('papers.json');
    const data = await resp.json();
    PAPERS = data.papers || [];
    // Update badges
    document.getElementById('browse-count').textContent = PAPERS.length;
    document.getElementById('mustread-count').textContent = PAPERS.filter(p=>p.importance==='must-read').length;
    document.getElementById('cns-count').textContent = PAPERS.filter(p=>journalTier(p.journal)==='cns').length;
  } catch(e) { console.error('Failed to load papers.json',e); }

  // Setup nav
  document.querySelectorAll('.sidebar nav a').forEach(a=>{
    a.addEventListener('click', e=>{ e.preventDefault(); navigateTo(a.dataset.page); });
  });

  // Render initial page
  const hash = window.location.hash.replace('#','') || 'dashboard';
  navigateTo(hash);
}
document.addEventListener('DOMContentLoaded', init);
</script>
