<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超越文献库 · 草食动物肝脏免疫代谢</title>
<style>
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --text: #2c3e50;
    --text-muted: #7f8c8d;
    --border: #e0ddd5;
    --tag: #fef9e7;
    --tag-border: #f9e79f;
    --text-cn: #555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    padding: 32px 24px;
    text-align: center;
  }
  .header h1 { font-size: 28px; margin-bottom: 4px; }
  .header h1 .lobster { display: inline-block; }
  .header p { opacity: .85; font-size: 14px; }
  .header .meta { margin-top: 8px; font-size: 12px; opacity: .7; }
  .nav {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav button {
    flex: 1; padding: 14px 8px; border: none; background: none;
    font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    border-bottom: 3px solid transparent; transition: all .2s;
  }
  .nav button:hover { color: var(--text); background: #fafafa; }
  .nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav button .badge {
    display: inline-block; background: var(--accent-light); color: white;
    font-size: 11px; border-radius: 10px; padding: 0 6px; margin-left: 4px; line-height: 18px;
  }
  .main { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .paper-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 14px; transition: box-shadow .2s; cursor: pointer;
  }
  .paper-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }

  /* 标题：英文 + 中文 */
  .paper-card .title-en {
    font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 2px;
    line-height: 1.4;
  }
  .paper-card .title-cn {
    font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px;
    line-height: 1.4;
  }

  /* 期刊行：突出显示 */
  .paper-card .journal-line {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .paper-card .journal-line .journal-name {
    font-size: 14px; font-weight: 700; color: #1a5276;
    background: #eaf2f8; padding: 1px 8px; border-radius: 4px;
  }
  .paper-card .journal-line .if-badge {
    font-size: 11px; background: #2c3e50; color: white;
    padding: 1px 6px; border-radius: 4px; display: inline-block;
  }
  .paper-card .journal-line .year-badge {
    font-size: 11px; color: white; background: var(--accent-light);
    padding: 1px 6px; border-radius: 4px;
  }

  .paper-card .meta-line {
    font-size: 13px; color: var(--text-muted); margin-bottom: 4px;
  }
  .paper-card .tags {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
  }
  .paper-card .tags span {
    font-size: 11px; background: var(--tag); color: #856404;
    border: 1px solid var(--tag-border); border-radius: 4px; padding: 2px 8px;
  }
  .paper-card .tags .must-read-tag {
    background: #fce4ec; color: #c0392b; border-color: #f5b7b1;
  }
  .paper-card .abstract {
    max-height: 0; overflow: hidden; transition: max-height .35s ease, margin .35s ease, padding .35s ease;
    font-size: 13px; color: #555; line-height: 1.7;
  }
  .paper-card.expanded .abstract {
    max-height: 1200px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .paper-card .abstract-en {
    margin-bottom: 8px;
  }
  .paper-card .abstract-en strong, .paper-card .abstract-cn strong {
    display: block; margin-bottom: 4px;
  }
  .paper-card .abstract-cn {
    color: var(--text-cn); border-left: 3px solid var(--accent-light); padding-left: 10px;
    margin-top: 4px;
  }
  .paper-card .links {
    display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;
  }
  .paper-card .links a {
    font-size: 12px; color: #2980b9; text-decoration: none; padding: 4px 10px;
    border: 1px solid #d5e8f0; border-radius: 6px; transition: all .2s;
  }
  .paper-card .links a:hover {
    background: #eaf4fa; border-color: #2980b9;
  }
  .paper-card .links a.disabled {
    color: #bbb; border-color: #eee; cursor: not-allowed; pointer-events: none;
  }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .update-banner {
    background: #eaf7ea; border: 1px solid #c3e6cb; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #155724;
  }
  .filter-bar {
    margin-bottom: 14px; display: flex; gap: 6px; flex-wrap: wrap;
  }
  .filter-bar input {
    flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; outline: none;
  }
  .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; background: white; outline: none; cursor: pointer;
  }
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .paper-card .title-en { font-size: 14px; }
    .paper-card .title-cn { font-size: 13px; }
    .nav button { font-size: 12px; padding: 12px 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🦞 超越文献库</h1>
  <p>草食动物肝脏免疫代谢适应性 · 单细胞空间转录组 · 进化</p>
  <div class="meta">目标期刊：<strong>Science</strong> · 每周更新 · by 小龙虾 · <a href="/admin.html" style="color:white;opacity:.9;text-decoration:underline;">管理后台</a></div>
</div>

<div class="nav">
  <button class="active" data-tab="new">🆕 新内容 <span class="badge" id="new-count">0</span></button>
  <button data-tab="must-read">⭐ 必读文献 <span class="badge" id="must-read-count">0</span></button>
  <button data-tab="library">📚 文献库 <span class="badge" id="library-count">0</span></button>
  <a href="/admin.html" target="_blank" style="display:flex;align-items:center;padding:8px 12px;text-decoration:none;color:#2980b9;font-size:13px;font-weight:600;border-bottom:3px solid transparent;">⚙️ 管理</a>
</div>

<div class="main">
  <div id="tab-new" class="tab-content active"></div>
  <div id="tab-must-read" class="tab-content"></div>
  <div id="tab-library" class="tab-content">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜索标题、作者、关键词..." oninput="filterLibrary()">
      <select id="filter-importance" onchange="filterLibrary()">
        <option value="all">全部</option>
        <option value="must-read">⭐ 必读</option>
        <option value="important">📌 重要</option>
        <option value="normal">📄 普通</option>
      </select>
      <select id="sort-by" onchange="filterLibrary()">
        <option value="relevance">📊 按相关度</option>
        <option value="impact">📈 按影响因子</option>
        <option value="date">📅 按收录日期</option>
        <option value="year">🗓 按出版年份</option>
      </select>
    </div>
    <div id="library-results"></div>
  </div>
</div>

<script>
// ===== 文献数据 =====
// ===== 文献数据（动态加载 papers.json）=====
let PAPERS_DATA = [];
let PAPERS_LOADED = false;

async function loadPapers() {
  if (PAPERS_LOADED) return;
  try {
    const resp = await fetch('papers.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    PAPERS_DATA = (data.papers || []).map(p => ({
      id: p.id || p.pmid || '',
      title: p.title || '',
      title_cn: p.title_cn || '',
      authors: p.authors || 'Multiple',
      journal: p.journal || 'Unknown',
      impact_factor: 0,
      year: p.year || 0,
      doi: p.doi || '',
      pmid: p.id || p.pmid || '',
      abstract: p.abstract || '',
      abstract_cn: p.abstract_cn || '',
      keywords: p.keywords || [],
      tags: p.tags || [],
      article_url: p.article_url || '',
      pmc_url: p.pmc_url || '#',
      importance: p.importance || 'important',
      added_date: p.added_date || '',
      relevance_score: 0
    }));
    PAPERS_LOADED = true;
    console.log('📚 已加载 ' + PAPERS_DATA.length + ' 篇文献');
  } catch(e) {
    console.error('加载 papers.json 失败:', e);
    document.getElementById('library-count').textContent = '加载失败';
  }
};

// ===== 页面逻辑 =====

// ===== 阅读状态 & 笔记系统 =====
function getReadStatus(pid) {
  try { const d = JSON.parse(localStorage.getItem('lit_read_status') || '{}'); return d[pid] || 'unread'; }
  catch(e) { return 'unread'; }
}
function setReadStatus(pid, status) {
  try { const d = JSON.parse(localStorage.getItem('lit_read_status') || '{}'); d[pid] = status; localStorage.setItem('lit_read_status', JSON.stringify(d)); }
  catch(e) {}
}
function getNotes(pid) {
  try { const d = JSON.parse(localStorage.getItem('lit_notes') || '{}'); return d[pid] || ''; }
  catch(e) { return ''; }
}
function setNotes(pid, text) {
  try { const d = JSON.parse(localStorage.getItem('lit_notes') || '{}'); d[pid] = text; localStorage.setItem('lit_notes', JSON.stringify(d)); }
  catch(e) {}
}
function getStatusLabel(s) { return {unread:'未读',reading:'在读',read:'已读'}[s] || '未读'; }
function getStatusColor(s) { return {unread:'#95a5a6',reading:'#f39c12',read:'#27ae60'}[s] || '#95a5a6'; }
function toggleStatus(pid, el) {
  const current = getReadStatus(pid);
  const next = {unread:'reading', reading:'read', read:'unread'}[current];
  setReadStatus(pid, next);
  const btn = el.querySelector('.status-btn');
  if (btn) { btn.textContent = getStatusLabel(next); btn.style.background = getStatusColor(next); }
}
function saveNote(pid, el) {
  const ta = el.querySelector('.note-textarea');
  if (ta) { setNotes(pid, ta.value); const saved = el.querySelector('.note-saved'); if(saved) { saved.textContent = '✓ 已保存'; saved.style.display = 'inline'; setTimeout(() => { saved.style.display = 'none'; }, 2000); } }
}
function restoreReadStates() {
  document.querySelectorAll('.paper-card').forEach(el => {
    const pid = el.dataset.pid;
    if (!pid) return;
    const status = getReadStatus(pid);
    const btn = el.querySelector('.status-btn');
    if (btn) { btn.textContent = getStatusLabel(status); btn.style.background = getStatusColor(status); }
    const savedNotes = getNotes(pid);
    const ta = el.querySelector('.note-textarea');
    if (ta && savedNotes) ta.value = savedNotes;
  });
}

function sortedByDate(ps) {
  return [...ps].sort((a, b) => (b.added_date || '').localeCompare(a.added_date || ''));
}

function renderCard(p) {
  const isMustRead = p.importance === 'must-read';
  const tags = p.tags || p.keywords || [];
  const score = p.relevance_score || 0;
  const scoreColor = score >= 70 ? "#27ae60" : score >= 40 ? "#f39c12" : "#95a5a6";

  const links = [];
  if (p.article_url && p.article_url !== '#')
    links.push(`<a href="${p.article_url}" target="_blank">🌐 原文链接</a>`);
  if (p.pmc_url && p.pmc_url !== '#')
    links.push(`<a href="${p.pmc_url}" target="_blank">🏛 PMC全文</a>`);
  if (p.doi)
    links.push(`<a href="https://doi.org/${p.doi}" target="_blank">🔗 DOI</a>`);
  if (links.length === 0)
    links.push('<span class="disabled">链接待补充</span>');

  return `
    <div class="paper-card" data-pid="${p.id}" onclick="this.classList.toggle('expanded')">
      <div class="title-en">${p.title}</div>
      <div class="title-cn">${p.title_cn || ''}</div>
      <div class="journal-line">
        <span class="journal-name">${p.journal}</span>
        ${p.impact_factor ? `<span class="if-badge">IF ${p.impact_factor}</span>` : ''}
        <span class="year-badge">${p.year}</span>
        <span style="font-size:12px;color:var(--text-muted);margin-left:auto;">PMID: ${p.pmid || '—'}</span>
      </div>
      <div class="meta-line">👤 ${p.authors}</div>
      <div class="meta-line">${p.volume ? `Vol. ${p.volume}` : ''}${p.issue ? `(${p.issue})` : ''}${p.pages ? `, pp ${p.pages}` : ''} · 收录：${p.added_date || '未知'}</div>
      <div class="tags">
        ${isMustRead ? '<span class="must-read-tag">⭐ 必读</span>' : (p.importance === 'important' ? '<span style="background:#e8f4fd;color:#2980b9;border-color:#b3d9f2;">📌 重要</span>' : '')}
        ${tags.slice(0, 6).map(t => `<span>${t}</span>`).join('')}
      </div>
      <div class="abstract">
        <div class="abstract-en"><strong>📖 Abstract</strong>${p.abstract}</div>
        ${p.abstract_cn ? `<div class="abstract-cn"><strong>📖 中文摘要</strong>${p.abstract_cn}</div>` : ''}
      </div>
      <div class="links">${links.join('')}</div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <button class="status-btn" style="border:none;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600;cursor:pointer;background:#95a5a6;color:white;" onclick="event.stopPropagation();toggleStatus('${p.id}', this.closest('.paper-card'))">未读</button>
        <span style="font-size:11px;color:#7f8c8d;cursor:pointer;" onclick="event.stopPropagation();var n=this.closest('.paper-card').querySelector('.note-section');if(n)n.style.display=n.style.display=='none'?'':'none';">✏️ 笔记</span>
        <span class="note-saved" style="font-size:11px;color:#27ae60;display:none;"></span>
      </div>
      <div class="note-section" style="display:none;margin-top:6px;" onclick="event.stopPropagation();">
        <textarea class="note-textarea" style="width:100%;min-height:60px;border:1px solid #ddd;border-radius:6px;padding:6px;font-size:12px;font-family:inherit;resize:vertical;" placeholder="写下你的想法、问题、想引用的点..."></textarea>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px;">
          <button style="border:none;border-radius:6px;padding:4px 12px;background:#c0392b;color:white;font-size:11px;cursor:pointer;" onclick="event.stopPropagation();saveNote('${p.id}', this.closest('.paper-card'))">💾 保存笔记</button>
          <span style="font-size:10px;color:#999;">笔记存在本地浏览器，有网时自动同步</span>
        </div>
      </div>
    </div>
  `;
}

function renderCards(ps) {
  if (!ps.length) return `<div class="empty-state"><div class="emoji">📭</div><p>暂无文献</p></div>`;
  return ps.map(renderCard).join('');
}

async function init() {
  await loadPapers();
  if (!PAPERS_DATA.length) { document.getElementById('library-results').innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>加载文献失败，请刷新重试</p></div>'; return; }
  document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const tab = document.getElementById('tab-' + btn.dataset.tab);
      tab.classList.add('active');
      if (btn.dataset.tab === 'library') filterLibrary();
    });
  });

  const sorted = sortedByDate(PAPERS_DATA);
  const mustRead = PAPERS_DATA.filter(p => p.importance === 'must-read');
  const newest = getSortFn('relevance', PAPERS_DATA).slice(0, 5);

  document.getElementById('new-count').textContent = newest.length;
  document.getElementById('must-read-count').textContent = mustRead.length;
  document.getElementById('library-count').textContent = PAPERS_DATA.length;

  document.getElementById('tab-new').innerHTML = renderCards(newest);
  document.getElementById('tab-must-read').innerHTML = renderCards(mustRead);
  filterLibrary();
}


function getSortFn(key, papers) {
  const sorted = [...papers];
  switch(key) {
    case 'relevance': sorted.sort((a,b) => (b.relevance_score||0) - (a.relevance_score||0)); break;
    case 'impact': sorted.sort((a,b) => (b.impact_factor||0) - (a.impact_factor||0)); break;
    case 'date': sorted.sort((a,b) => (b.added_date||'').localeCompare(a.added_date||'')); break;
    case 'year': sorted.sort((a,b) => (b.year||0) - (a.year||0)); break;
  }
  return sorted;
}

function filterLibrary() {
  const searchTerm = (document.getElementById('search-input').value || '').toLowerCase();
  const importanceFilter = document.getElementById('filter-importance').value;
  let filtered = PAPERS_DATA;

  if (searchTerm) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(searchTerm) ||
      (p.title_cn || '').includes(searchTerm) ||
      p.authors.toLowerCase().includes(searchTerm) ||
      (p.tags || []).some(t => t.toLowerCase().includes(searchTerm)) ||
      (p.keywords || []).some(k => k.toLowerCase().includes(searchTerm)) ||
      p.journal.toLowerCase().includes(searchTerm)
    );
  }

  if (importanceFilter !== 'all')
    filtered = filtered.filter(p => p.importance === importanceFilter);

  const sortKey = document.getElementById('sort-by').value;
  filtered = getSortFn(sortKey, filtered);
  document.getElementById('library-results').innerHTML = renderCards(filtered);
  setTimeout(restoreReadStates, 50);
  document.getElementById('library-count').textContent = PAPERS_DATA.length;
}

document.addEventListener('DOMContentLoaded', function() { init(); setTimeout(restoreReadStates, 200); });
</script>
</body>
</html>
